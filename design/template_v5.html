<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Dynamic Font Injection -->
    {{FONT_IMPORT}}
    <style>
        /* Design System Variables */
        :root {
            {{DESIGN_TOKENS}}
        }

        {{CSS_CONTENT}}

        @page {
            size: A4;
            margin: 20mm;
        }

        @page:first {
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- COVER PAGE                                                    -->
    <!-- ============================================================ -->
    <div class="page cover-page">
        <div class="cover-bg"></div>
        {{COVER_IMAGE}}
        <div class="cover-decoration">{{COVER_DECORATION_NUM}}</div>
        <div class="cover-body">
            <p class="cover-label">{{COVER_LABEL}}</p>
            <h1 class="cover-title">{{TITLE}}</h1>
            <div class="cover-rule"></div>
            <p class="cover-tagline">{{COVER_TAGLINE}}</p>
            <p class="cover-blurb">{{COVER_BLURB}}</p>
            <p class="cover-author">{{AUTHOR}}</p>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- TABLE OF CONTENTS                                             -->
    <!-- ============================================================ -->
    <div class="page toc-page">
        <div class="toc-header">
            <div class="toc-header-label">Contents</div>
            <h2 class="toc-title">Table of<br>Contents</h2>
        </div>
        {{TOC_CONTENT}}
    </div>

    <!-- ============================================================ -->
    <!-- MAIN CONTENT (Chapter Openers + Body)                         -->
    <!-- ============================================================ -->
    {{MAIN_CONTENT}}

</body>
</html>
